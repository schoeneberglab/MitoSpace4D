apiVersion: batch/v1
kind: Job
metadata:
  name: rsync-job
spec:
  template:
    spec:
      containers:
      - name: rsync-container
        image: instrumentisto/rsync-ssh
        command:
          - "sh"
        args:
          - "-c"
          - |
            mkdir -p /mnt/data/source && \
            rsync -avz --progress -e "ssh -o StrictHostKeyChecking=no" user@your-local-machine:/path/to/local/files/ /mnt/data/source/
        volumeMounts:
        - name: pvc-storage
          mountPath: /mnt/data
        env:
        - name: SSH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rsync-secret
              key: password
        - name: SSH_USERNAME
          valueFrom:
            secretKeyRef:
              name: rsync-secret
              key: user
      restartPolicy: Never
      volumes:
      - name: pvc-storage
        persistentVolumeClaim:
          claimName: <your-existing-pvc-name>  # Use your existing PVC here
  backoffLimit: 1
