name: deeplearning-arm
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  # Core
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - scikit-image
  - pillow
  - matplotlib
  - seaborn
  - tqdm

  # Jupyter / dev
  - ipykernel
  - jupyterlab
  - ipywidgets

  # PyTorch stack (CPU or ARM-appropriate build)
  - pytorch
  - torchvision
  - torchaudio

  # Imaging / video (safe high-level deps)
  - imageio
  - imageio-ffmpeg
  - opencv

  # Misc scientific / utils
  - h5py
  - numba
  - statsmodels
  - sympy

  # You can add more conda packages here if you know you need them

  - pip:
      # HuggingFace ecosystem / DL
      - accelerate
      - diffusers
      - transformers
      - datasets
      - safetensors
      - sentencepiece
      - einops
      - pytorch-lightning

      # Vision / audio extras
      - opencv-python
      - albumentations
      - librosa

      # COCO tools (often easier via pip on ARM)
      - pycocotools

      # Notebooks / viz extras
      - jupyterlab_widgets
      - ipywidgets
